<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login – MeetUP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='MeetUpLogo.png') }}">
</head>
<body>

<div class="container-small">
    <h1>Login</h1>

    {% if error %}
        <p style="color: salmon;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Benutzername" required autofocus>
        <input type="password" name="password" placeholder="Passwort" required>
        <div class="button-row">
            <button class="but" type="submit">Einloggen</button>
            <a href="{{ url_for('register') }}"><button class="but" type="button">Registrieren</button></a>
            <a href="{{ url_for('index') }}"><button class="but" type="button">Abbrechen</button></a>
        </div>
    </form>
</div>

</body>
</html>
